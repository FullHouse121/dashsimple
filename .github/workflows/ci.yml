name: CI
on:
  push:
    branches: [main, "ux/**", "feat/**", "fix/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Server syntax
        run: node --check server/index.js
      - name: Unit tests (scoping + auth boundaries)
        run: npx vitest run
      - name: Frontend build
        run: npm run build
